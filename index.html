<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="Since Day Dot — a member-driven clothing brand built by eleven, carried by all."/>
  <meta property="og:title" content="Since Day Dot"/>
  <meta property="og:description" content="Built by eleven. Carried by all."/>
  <title>Since Day Dot</title>

  <!-- ═══ FONTS ═══ -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- ═══ TAILWIND — CDN must load before tailwind.config is set ═══ -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:   '#0D0D0D',
            bone:  '#F2EDE4',
            gold:  '#C4963A',
            stone: '#7A7570',
            chalk: '#FAFAF8',
          },
          fontFamily: {
            display: ['Oswald', 'sans-serif'],
            body:    ['DM Sans', 'sans-serif'],
            mono:    ['"Space Mono"', 'monospace'],
          },
        },
      },
    };
  </script>

  <!-- ═══ STYLES ═══ -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg-bone text-ink font-body antialiased">

  <div id="root"></div>

  <!-- ═══ React 18 + ReactDOM + htm — UMD builds, no import map needed ═══ -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3/dist/htm.js"></script>

  <script src="script.js"></script>
</body>
</html>
