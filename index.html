<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="Since Day Dot — a member-driven clothing brand built by eleven, carried by all."/>
  <meta property="og:title" content="Since Day Dot"/>
  <meta property="og:description" content="Built by eleven. Carried by all."/>
  <title>Since Day Dot</title>

  <!-- ═══ FONTS — Change family names here to swap typefaces ═══ -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- ═══ TAILWIND — Utility classes, no install needed ═══ -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    /* ═══ TAILWIND THEME — Edit colors and fonts here ═══ */
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:   '#0D0D0D',   /* near-black — primary text/bg */
            bone:  '#F2EDE4',   /* warm off-white — page background */
            gold:  '#C4963A',   /* warm gold — accent / CTA */
            stone: '#7A7570',   /* warm gray — secondary text */
            chalk: '#FAFAF8',   /* near-white — cards/panels */
          },
          fontFamily: {
            display: ['Oswald', 'sans-serif'],
            body:    ['DM Sans', 'sans-serif'],
            mono:    ['"Space Mono"', 'monospace'],
          },
        },
      },
    };
  </script>

  <!-- ═══ STYLES ═══ -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="bg-bone text-ink font-body antialiased">

  <div id="root"></div>

  <!-- ═══ MODULE IMPORTS — React via CDN, no build step needed ═══ -->
  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@18",
      "react-dom/client": "https://esm.sh/react-dom@18/client",
      "htm":              "https://esm.sh/htm@3"
    }
  }
  </script>

  <script type="module" src="script.js"></script>
</body>
</html>
