<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <meta name="description" content="Since Day Dot — a member-driven clothing brand built by eleven, carried by all."/>
  <meta property="og:title" content="Since Day Dot"/>
  <meta property="og:description" content="Built by eleven. Carried by all."/>
  <title>Since Day Dot</title>

  <!-- ═══ FONTS ═══ -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <!-- ═══ TAILWIND — CDN loads first, config assigned after ═══ -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink:   '#0D0D0D',
            bone:  '#F2EDE4',
            gold:  '#C4963A',
            stone: '#7A7570',
            chalk: '#FAFAF8',
          },
          fontFamily: {
            display: ['Oswald', 'sans-serif'],
            body:    ['DM Sans', 'sans-serif'],
            mono:    ['"Space Mono"', 'monospace'],
          },
        },
      },
    };
  </script>

  <!-- ═══ STYLES ═══ -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body style="background:#F2EDE4" class="bg-bone text-ink font-body antialiased">

  <div id="root"></div>

  <!-- ═══ React 18 + htm — vendored locally, no CDN needed ═══ -->
  <script src="vendor/react.min.js"></script>
  <script src="vendor/react-dom.min.js"></script>
  <script src="vendor/htm.js"></script>
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('root').innerHTML =
        '<div style="padding:2rem;font-family:monospace;color:#c00;background:#fff2f2;border:1px solid #c00;margin:2rem">' +
        '<strong>JS Error</strong><br>' + msg + '<br><small>' + src + ':' + line + '</small></div>';
    };
  </script>
  <script src="script.js"></script>
</body>
</html>
